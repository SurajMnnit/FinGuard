openapi: 3.0.0
info:
  title: FinGuard API
  description: Finance Data Processing and Access Control Backend
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Created
  /api/auth/login:
    post:
      summary: Login user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
  
  /api/users:
    get:
      summary: Get all users (Admin only)
      tags: [Users]
      responses:
        '200':
          description: OK
  /api/users/{id}/role:
    put:
      summary: Update user role (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [VIEWER, ANALYST, ADMIN]
      responses:
        '200':
          description: OK
  /api/users/{id}/status:
    put:
      summary: Activate or deactivate a user (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: OK

  /api/records:
    get:
      summary: Get records (Scoped by role - Viewers see own, Analysts/Admins see all)
      tags: [Records]
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Records per page
          schema:
            type: integer
            default: 10
        - name: type
          in: query
          description: Filter by type
          schema:
            type: string
            enum: [INCOME, EXPENSE]
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: startDate
          in: query
          description: Filter by start date (ISO format)
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: Filter by end date (ISO format)
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          description: Search in category or description
          schema:
            type: string
      responses:
        '200':
          description: Successful response with records and pagination
    post:
      summary: Create a new record (Admin and Analyst only)
      tags: [Records]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type, category, date]
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [INCOME, EXPENSE]
                category:
                  type: string
                date:
                  type: string
                  format: date-time
                description:
                  type: string
                userId:
                  type: integer
                  description: "For Admins: target user ID for this record"
      responses:
        '201':
          description: Created
  /api/records/{id}:
    get:
      summary: Get a record by ID (Scoped)
      tags: [Records]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    put:
      summary: Update a record by ID (Admin only)
      tags: [Records]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [INCOME, EXPENSE]
                category:
                  type: string
                date:
                  type: string
                  format: date-time
                description:
                  type: string
                userId:
                  type: integer
      responses:
        '200':
          description: OK
    delete:
      summary: Delete a record by ID (Admin only)
      tags: [Records]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK



  /api/dashboard:
    get:
      summary: Get dashboard analytics calculations
      tags: [Dashboard]
      responses:
        '200':
          description: OK
